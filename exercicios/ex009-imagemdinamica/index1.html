<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplesmente aumente e diminua o seu navegador.</p>
    <picture> <!-- tag <picture> para trabalhar com imagem dinâmica-->
              <!--media=(min-width: px) largura mínima srcset="imagem" imagem que irá substituir a anterior type="imagem/png" tipo de imagem-->
              <!--Este foi programado de forma invertida, ao invés de (max) foi  usado o (min)-->
       
        <source media="(min-width:1050px )" srcset="imagens/grande.png" type="image/png">
        <source media="(min-width:900px )" srcset="imagens/imggm.png" type="image/png">
        <source media="(min-width:750px )" srcset="imagens/media.png" type="image/png">
        <source media="(min-width: 550px)" srcset="imagens/imgpm.png" type="image/png">
                      
        <img src="imagens/pequena.png" alt="Imagem flexível">
    </picture>
    
</body>
</html>
